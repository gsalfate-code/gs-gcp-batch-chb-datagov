name: chb_datagov
version: '1.0.0'
config-version: 2

profile: chb_datagov

model-paths: ["models"]
test-paths:  ["tests"]
seed-paths:  ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  chb_datagov:
    staging:
      +materialized: view
      +database: gs-gcp-batch-chb-datagov
      +schema: silver
    marts:
      +materialized: table
      +database: gs-gcp-batch-chb-datagov
      +schema: gold

vars:
  project_id:     "gs-gcp-batch-chb-datagov"
  dataset_silver: "silver"
  dataset_gold:   "gold"
  timezone:       "America/Santiago"
